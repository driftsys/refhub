name: Bug report
description: Report a bug to help us improve
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `...`
        2. Pass `...`
        3. Observe `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: input
    id: project
    attributes:
      label: Project
      description: Which driftsys project is affected?
      placeholder: "e.g., markspec v0.0.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 15.3, Ubuntu 24.04, Windows 11"
    validations:
      required: true

  - type: input
    id: toolchain
    attributes:
      label: Toolchain
      description: Language/compiler version if relevant.
      placeholder: "e.g., Deno 2.x"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant output, errors, or screenshots.
      render: text
    validations:
      required: false
